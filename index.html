<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASEL SPEED TEST | Powered by MD RASEL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glow-bg"></div>

    <nav class="navbar">
        <div class="logo">
            <span class="neon-blue">RASEL</span> <span class="text-white">SPEED TEST</span>
        </div>
        <div class="branding">Powered by MD RASEL</div>
    </nav>

    <main class="container">
        <!-- Main Speed Meter -->
        <section class="meter-section glass-card">
            <div class="speedometer">
                <svg class="meter-svg" viewBox="0 0 200 200">
                    <circle class="meter-bg" cx="100" cy="100" r="90"></circle>
                    <circle id="meter-progress" class="meter-fill" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="meter-content">
                    <h1 id="main-speed">0.0</h1>
                    <span>Mbps</span>
                </div>
            </div>
            <button id="start-btn">BEGIN TEST</button>
            <p id="status-text">READY FOR SCAN</p>
        </section>

        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card glass-card">
                <i class="fas fa-download icon-blue"></i>
                <p>Download</p>
                <h2 id="down-val">0.00</h2>
                <small>Mbps</small>
            </div>
            <div class="stat-card glass-card">
                <i class="fas fa-upload icon-purple"></i>
                <p>Upload</p>
                <h2 id="up-val">0.00</h2>
                <small>Mbps</small>
            </div>
            <div class="stat-card glass-card">
                <i class="fas fa-microchip icon-green"></i>
                <p>Ping</p>
                <h2 id="ping-val">0</h2>
                <small>ms</small>
            </div>
            <div class="stat-card glass-card">
                <i class="fas fa-random icon-pink"></i>
                <p>Jitter</p>
                <h2 id="jitter-val">0</h2>
                <small>ms</small>
            </div>
        </section>

        <!-- Connection & Provider Info -->
        <section class="info-grid">
            <div class="info-card glass-card">
                <h3><i class="fas fa-network-wired"></i> Network Provider</h3>
                <div class="detail-row"><span>ISP Name:</span> <b id="isp-name" class="neon-green">Fetching...</b></div>
                <div class="detail-row"><span>IP Address:</span> <b id="ip-address">0.0.0.0</b></div>
                <div class="detail-row"><span>Location:</span> <b id="user-loc">Unknown</b></div>
            </div>
            <div class="info-card glass-card">
                <h3><i class="fas fa-mobile-alt"></i> Device Details</h3>
                <div class="detail-row"><span>OS:</span> <b id="os-name">Detecting...</b></div>
                <div class="detail-row"><span>Browser:</span> <b id="browser-name">Detecting...</b></div>
                <div class="detail-row"><span>Hardware:</span> <b id="cpu-info">Multi-Core</b></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
