<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASEL SPEED TEST | Powered by MD RASEL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mouse-glow" id="mouse-glow"></div>

    <nav class="glass-nav">
        <div class="logo">
            <span class="neon-text">RASEL</span> <span class="white-text">SPEED TEST</span>
        </div>
        <div class="branding">Powered by MD RASEL</div>
    </nav>

    <main class="container">
        <!-- Main Gauge Section -->
        <div class="gauge-section glass-card">
            <div class="gauge-container">
                <svg class="progress-ring" width="280" height="280">
                    <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="12" fill="transparent" r="120" cx="140" cy="140"/>
                    <circle id="speed-indicator" class="progress-ring__circle" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" fill="transparent" r="120" cx="140" cy="140"/>
                </svg>
                <div class="gauge-inner">
                    <h1 id="live-speed">0.0</h1>
                    <p>Mbps</p>
                </div>
            </div>
            
            <div class="action-area">
                <button id="start-btn">START TEST</button>
                <p id="test-status">READY TO SCAN NETWORK</p>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="glass-card stat-item">
                <i class="fas fa-download icon-down"></i>
                <div class="label">Download</div>
                <div class="value" id="download-val">0.00</div>
                <div class="unit">Mbps</div>
            </div>
            <div class="glass-card stat-item">
                <i class="fas fa-upload icon-up"></i>
                <div class="label">Upload</div>
                <div class="value" id="upload-val">0.00</div>
                <div class="unit">Mbps</div>
            </div>
            <div class="glass-card stat-item">
                <i class="fas fa-bolt icon-ping"></i>
                <div class="label">Ping</div>
                <div class="value" id="ping-val">0</div>
                <div class="unit">ms</div>
            </div>
            <div class="glass-card stat-item">
                <i class="fas fa-wave-square icon-jitter"></i>
                <div class="label">Jitter</div>
                <div class="value" id="jitter-val">0</div>
                <div class="unit">ms</div>
            </div>
        </div>

        <!-- Network Info -->
        <div class="info-section">
            <div class="glass-card info-box">
                <h3><i class="fas fa-network-wired"></i> Connection</h3>
                <div class="info-row"><span>IP Address:</span> <span id="ip-addr" class="highlight">Detecting...</span></div>
                <div class="info-row"><span>ISP:</span> <span id="isp-name">Detecting...</span></div>
                <div class="info-row"><span>Location:</span> <span id="location">...</span></div>
            </div>
            <div class="glass-card info-box">
                <h3><i class="fas fa-laptop"></i> System Info</h3>
                <div class="info-row"><span>OS:</span> <span id="os-info">...</span></div>
                <div class="info-row"><span>Browser:</span> <span id="browser-info">...</span></div>
                <div class="info-row"><span>Status:</span> <span id="online-status">Online</span></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
