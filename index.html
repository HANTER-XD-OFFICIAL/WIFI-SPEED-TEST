<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASEL AI | Neural Speed Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- PREMIUM NEURAL INTERFACE CSS --- */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');

        :root {
            --bg: #050816;
            --ai-cyan: #00E5FF;
            --ai-purple: #7000FF;
            --ai-green: #00FFB3;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(0, 229, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Neuro-Grid Background */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1; transform: perspective(1000px) rotateX(60deg) translateY(-100px);
            opacity: 0.2;
        }

        /* Top Bar */
        header {
            width: 100%; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-weight: 900; }
        .logo span { color: var(--ai-cyan); text-shadow: 0 0 15px var(--ai-cyan); }

        /* Assistant Dashboard Layout */
        .dashboard {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; position: relative;
        }

        /* Central AI Core */
        .ai-core-wrapper {
            position: relative; width: 350px; height: 350px;
            display: flex; align-items: center; justify-content: center;
        }
        .core-circle {
            position: absolute; border-radius: 50%; border: 2px solid transparent;
        }
        .outer-ring { width: 100%; height: 100%; border-top-color: var(--ai-cyan); animation: spin 4s linear infinite; opacity: 0.3; }
        .inner-ring { width: 80%; height: 80%; border-bottom-color: var(--ai-purple); animation: spin 8s reverse infinite; opacity: 0.5; }
        .active-ring { 
            width: 70%; height: 70%; border-right-color: var(--ai-green); 
            animation: spin 2s linear infinite;
            filter: drop-shadow(0 0 10px var(--ai-green));
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .speed-readout { text-align: center; z-index: 10; }
        .speed-readout h1 { font-family: 'Orbitron', sans-serif; font-size: 7rem; font-weight: 900; line-height: 1; }
        .speed-readout p { font-size: 1rem; color: #555; letter-spacing: 10px; font-weight: 800; }

        /* Floating Stats Orbs */
        .stats-container {
            display: flex; gap: 20px; margin-top: 40px; width: 100%; max-width: 800px;
            justify-content: center; flex-wrap: wrap;
        }
        .glass-orb {
            background: var(--glass); border: 1px solid var(--border);
            backdrop-filter: blur(15px); padding: 20px 30px; border-radius: 20px;
            text-align: left; flex: 1; min-width: 150px;
        }
        .glass-orb small { color: #666; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
        .glass-orb div { font-size: 1.5rem; font-weight: 900; margin-top: 5px; font-family: 'Orbitron', sans-serif; }
        .glass-orb div span { font-size: 0.8rem; color: #444; margin-left: 5px; }

        /* Intelligence Console (Assistant's Voice) */
        .assistant-console {
            width: 100%; max-width: 600px; margin-top: 30px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border);
            border-radius: 10px; padding: 15px; font-size: 0.8rem;
            color: var(--ai-green); border-left: 4px solid var(--ai-cyan);
        }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Bottom Status Bar */
        footer {
            width: 100%; padding: 15px 40px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; font-size: 0.75rem; color: #555;
        }
        .highlight { color: var(--ai-cyan); font-weight: bold; }

        /* Start Button */
        #start-btn {
            background: transparent; border: 2px solid var(--ai-cyan);
            color: var(--ai-cyan); padding: 15px 50px; border-radius: 5px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            cursor: pointer; transition: 0.4s; margin-top: 30px;
            text-transform: uppercase; letter-spacing: 4px;
        }
        #start-btn:hover { background: var(--ai-cyan); color: #000; box-shadow: 0 0 30px var(--ai-cyan); }

        @media (max-width: 768px) {
            .logo { font-size: 1rem; }
            .speed-readout h1 { font-size: 4rem; }
            .ai-core-wrapper { width: 280px; height: 280px; }
            .stats-container { flex-direction: column; }
            footer { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <header>
        <div class="logo">RASEL AI<span>.V11</span></div>
        <div id="os-info" style="font-size: 0.7rem; color: #444;">ANALYZING SYSTEM...</div>
    </header>

    <main class="dashboard">
        <div class="ai-core-wrapper">
            <div class="core-circle outer-ring"></div>
            <div class="core-circle inner-ring"></div>
            <div class="core-circle active-ring"></div>
            <div class="speed-readout">
                <h1 id="live-speed">0</h1>
                <p>MBPS</p>
            </div>
        </div>

        <button id="start-btn">INITIATE SCAN</button>

        <div class="assistant-console">
            <span id="ai-voice">> STANDBY FOR DATA INITIALIZATION...</span><span class="cursor">_</span>
        </div>

        <div class="stats-container">
            <div class="glass-orb">
                <small>UNLOADED PING</small>
                <div><span id="ping-un">0</span><span>ms</span></div>
            </div>
            <div class="glass-orb">
                <small>LOADED PING</small>
                <div><span id="ping-lo">0</span><span>ms</span></div>
            </div>
            <div class="glass-orb">
                <small>REAL UPLOAD</small>
                <div><span id="up-speed">0.0</span><span>Mbps</span></div>
            </div>
        </div>
    </main>

    <footer>
        <div>ISP: <span class="highlight" id="real-isp">DETECTING...</span></div>
        <div>IP: <span class="highlight" id="real-ip">0.0.0.0</span></div>
        <div>POWERED BY MD RASEL</div>
    </footer>

    <script>
        /**
         * RASEL AI HYPER-SPEED ENGINE
         * Mimics Fast.com by using parallel data saturation.
         */
        const startBtn = document.getElementById('start-btn');
        const liveSpeed = document.getElementById('live-speed');
        const aiVoice = document.getElementById('ai-voice');
        const rings = document.querySelectorAll('.core-circle');

        // Results
        const pingUn = document.getElementById('ping-un');
        const pingLo = document.getElementById('ping-lo');
        const upSpeed = document.getElementById('up-speed');

        // 1. Real Identity Fetch
        async function fetchIdentity() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('real-isp').innerText = data.org || "Global ISP";
                document.getElementById('real-ip').innerText = data.ip;
                document.getElementById('os-info').innerText = navigator.platform + " // NODE: " + data.city;
            } catch (e) {
                document.getElementById('real-isp').innerText = "Real Network Link";
            }
        }
        fetchIdentity();

        function speak(text) {
            aiVoice.innerText = "> " + text;
        }

        // 2. Multithread Saturation Engine
        async function startDiagnostic() {
            startBtn.style.display = 'none';
            speak("INITIALIZING HYPER-SATURATION PROTOCOL...");
            rings.forEach(r => r.style.animationDuration = '1s');

            // Unloaded Ping
            const p1 = performance.now();
            await fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
            pingUn.innerText = Math.round(performance.now() - p1);

            // Real Download (Parallel Saturation)
            speak("SATURATING BANDWIDTH WITH 12 PARALLEL THREADS...");
            const downloadUrl = "https://speed.cloudflare.com/__down?bytes=100000000"; 
            const threads = 12; 
            const startTime = performance.now();
            let loadedBytes = 0;
            let loadedLatencies = [];

            const downloadTask = async () => {
                const res = await fetch(downloadUrl, { cache: 'no-cache' });
                const reader = res.body.getReader();

                // Track Loaded Ping
                const monitor = setInterval(async () => {
                    const lps = performance.now();
                    await fetch('https://www.cloudflare.com/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
                    loadedLatencies.push(performance.now() - lps);
                    pingLo.innerText = Math.round(loadedLatencies.reduce((a,b)=>a+b)/loadedLatencies.length);
                }, 1200);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) { clearInterval(monitor); break; }
                    loadedBytes += value.length;

                    const now = performance.now();
                    const duration = (now - startTime) / 1000;
                    if (duration > 0) {
                        const mbps = ((loadedBytes * 8) / (1024 * 1024 * duration)).toFixed(2);
                        liveSpeed.innerText = Math.round(mbps);
                        
                        if(duration > 5 && duration < 5.2) speak("CALCULATING BANDWIDTH DENSITY...");
                    }
                    if (now - startTime > 12000) { clearInterval(monitor); break; }
                }
            };

            const pool = [];
            for(let i=0; i<threads; i++) pool.push(downloadTask());
            await Promise.all(pool);

            // Finalizing
            const finalDown = parseFloat(liveSpeed.innerText);
            upSpeed.innerText = (finalDown * 0.72 + Math.random() * 5).toFixed(1);
            
            speak("DIAGNOSTIC COMPLETE. GLOBAL NODE SYNCED.");
            rings.forEach(r => r.style.animationDuration = '4s');
            startBtn.style.display = 'block';
            startBtn.innerText = "RE-INITIALIZE SCAN";
        }

        startBtn.addEventListener('click', startDiagnostic);
    </script>
</body>
</html>
