<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASEL SPEED TEST | Powered by MD RASEL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glow-overlay"></div>
    
    <nav class="top-nav">
        <div class="logo">RASEL <span class="accent">SPEED</span></div>
        <div class="provider-info">
            <span id="isp-name">Detecting ISP...</span>
            <span class="separator">|</span>
            <span id="location-name">Global Server</span>
        </div>
    </nav>

    <main class="dashboard">
        <!-- Main Real-time Speed Display -->
        <div class="hero-gauge">
            <div class="main-ring">
                <svg viewBox="0 0 200 200">
                    <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
                    <circle id="ring-progress" class="ring-active" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="speed-content">
                    <h1 id="live-mbps">0</h1>
                    <span class="unit">Mbps</span>
                </div>
            </div>
            <div class="controls">
                <button id="start-btn">GO</button>
                <p id="status-update">Ready to Test</p>
            </div>
        </div>

        <!-- Professional Stats Grid -->
        <div class="stats-container">
            <div class="stat-card glass download">
                <div class="stat-header">
                    <i class="fas fa-arrow-down"></i> DOWNLOAD
                </div>
                <div class="stat-body">
                    <span id="final-down">0.00</span> <small>Mbps</small>
                </div>
            </div>
            <div class="stat-card glass upload">
                <div class="stat-header">
                    <i class="fas fa-arrow-up"></i> UPLOAD
                </div>
                <div class="stat-body">
                    <span id="final-up">0.00</span> <small>Mbps</small>
                </div>
            </div>
            <div class="stat-card glass latency">
                <div class="stat-header">
                    <i class="fas fa-bolt"></i> PING
                </div>
                <div class="stat-body">
                    <span id="ping-val">0</span> <small>ms</small>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        Powered by MD RASEL | Multi-Thread Engine v5.0
    </footer>

    <script src="script.js"></script>
</body>
</html>
